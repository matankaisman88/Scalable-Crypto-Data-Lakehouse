# Scalable Crypto Data Lakehouse - Docker Compose
# Spark Master, 1 Worker (4GB), History Server, Ingest service

services:
  spark-master:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: crypto-lakehouse-spark:latest
    container_name: spark-master
    ports:
      - "7077:7077"
      - "8080:8080"
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - SPARK_EVENTLOG_ENABLED=true
      - SPARK_EVENTLOG_DIR=/opt/spark-events
      - PYTHONPATH=/opt/spark-app
    volumes:
      - ../data:/data
      - ../data/spark-events:/opt/spark-events
      - ../src:/opt/spark-app/src
      - ../config:/opt/spark-app/config
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    networks:
      - spark-net

  spark-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: crypto-lakehouse-spark:latest
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_CORES=4
      - SPARK_WORKER_MEMORY=8G
      - SPARK_EXECUTOR_MEMORY=2G
      - SPARK_EVENTLOG_ENABLED=true
      - SPARK_EVENTLOG_DIR=/opt/spark-events
    volumes:
      - ../data:/data
      - ../data/spark-events:/opt/spark-events
      - ../src:/opt/spark-app/src
      - ../config:/opt/spark-app/config
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    deploy:
      resources:
        limits:
          memory: 8G
    networks:
      - spark-net

  history-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: crypto-lakehouse-spark:latest
    container_name: spark-history
    depends_on:
      - spark-master
    ports:
      - "18080:18080"
    environment:
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=/opt/spark-events
    volumes:
      - ../data/spark-events:/opt/spark-events
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.history.HistoryServer
    networks:
      - spark-net

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: crypto-lakehouse-spark:latest
    container_name: dashboard
    depends_on:
      - spark-master
    environment:
      - PYTHONPATH=/opt/spark-app
      # Set your OpenAI API key here or in a .env file at the project root.
      # The AI Query feature will be disabled if this variable is not provided.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Optional: override the model (default: gpt-4o-mini)
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    working_dir: /opt/spark-app
    volumes:
      - ../data:/data
      - ../data/spark-events:/opt/spark-events
      - ../src:/opt/spark-app/src
      - ../config:/opt/spark-app/config
      # Mount scripts so the Manual Refresh button can invoke them
      - ../scripts:/opt/spark-app/scripts
    ports:
      - "8501:8501"
    command: streamlit run src/dashboard/app.py --server.port=8501 --server.address=0.0.0.0

  ingest:
    image: amazon/aws-cli:latest
    container_name: ingest
    volumes:
      - ../data:/data
    working_dir: /data
    environment:
      - SYMBOL=${SYMBOL:-BTCUSDT}
      - RESOLUTION=${RESOLUTION:-1m}
      - DATE_PATTERN=${DATE_PATTERN:-2024-01}
    # Sync Binance public S3 - no credentials needed
    # Scoped by symbol, resolution and date pattern
    command: >
      s3 sync
      s3://data.binance.vision/data/spot/daily/klines/${SYMBOL}/${RESOLUTION}/
      /data/raw/${SYMBOL}/${RESOLUTION}/
      --no-sign-request
      --exclude "*"
      --include "*${DATE_PATTERN}*"
    networks:
      - spark-net

networks:
  spark-net:
    driver: bridge
